version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: eventra-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: college_events
      MYSQL_USER: eventra_user
      MYSQL_PASSWORD: eventra_password
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventra-network

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventra-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Spring Profile
      SPRING_PROFILES_ACTIVE: dev
      # Database Configuration
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: college_events
      DB_USERNAME: eventra_user
      DB_PASSWORD: eventra_password
      # JWT Secret
      JWT_SECRET: dev-secret-key-change-in-production-1234567890
      # Mail Configuration (Update with actual Gmail credentials)
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: your-email@gmail.com
      MAIL_PASSWORD: your-app-password
      MAIL_FROM: your-email@gmail.com
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - ./target:/app/target
    networks:
      - eventra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
    driver: local

networks:
  eventra-network:
    driver: bridge
